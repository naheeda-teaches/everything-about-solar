<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Teacher Dashboard · Solar Park Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet"/>
<style>
:root {
  --sun:#FFB703; --sun-light:#FFF8E1; --sun-dark:#FB8500;
  --sky:#219EBC; --sky-light:#D0EFFA; --sky-dark:#023047;
  --green:#52B788; --green-light:#D8F3DC; --green-dark:#1B4332;
  --red:#EF5350; --red-light:#FFEBEE;
  --amber:#F59E0B; --amber-light:#FEF3C7;
  --purple:#7C3AED; --purple-light:#EDE9FE;
  --bg:#F0F4F8; --card:#FFFFFF;
  --text:#0f172a; --muted:#64748b; --border:#E2E8F0;
  --radius:16px; --radius-sm:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── LOGIN ── */
#login-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--sky-dark) 0%,#0a4a6e 60%,#0d3d5a 100%);
  padding:24px;
}
.login-card{
  background:#fff;border-radius:24px;padding:52px 44px;max-width:440px;width:100%;
  box-shadow:0 24px 64px rgba(2,48,71,.35);text-align:center;
}
.login-logo{font-size:56px;display:block;margin-bottom:10px;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.login-title{font-family:'Fredoka One',cursive;font-size:30px;color:var(--sky-dark);margin-bottom:6px;}
.login-sub{font-size:15px;color:var(--muted);margin-bottom:36px;}
.pin-dots{display:flex;justify-content:center;gap:14px;margin-bottom:28px;}
.pin-dot{
  width:52px;height:52px;border-radius:50%;border:3px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:28px;font-weight:900;color:var(--sky-dark);
  transition:all .2s;background:var(--sky-light);
}
.pin-dot.filled{border-color:var(--sky);background:var(--sky);color:#fff;}
.pin-dot.error{border-color:var(--red);background:var(--red-light);animation:shake .3s;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:260px;margin:0 auto;}
.num-btn{
  background:var(--bg);border:2px solid var(--border);border-radius:14px;
  padding:16px;font-family:'Fredoka One',cursive;font-size:22px;color:var(--sky-dark);
  cursor:pointer;transition:all .15s;
}
.num-btn:hover{background:var(--sky-light);border-color:var(--sky);transform:scale(1.05);}
.num-btn:active{transform:scale(.97);}
.num-btn.del{font-size:18px;color:var(--red);}
.num-btn.go{background:var(--sun);border-color:var(--sun-dark);color:var(--sky-dark);}
.num-btn.go:hover{background:var(--sun-dark);color:#fff;}
.login-hint{margin-top:20px;font-size:13px;color:var(--muted);font-weight:600;}

/* ── MAIN APP ── */
#app{display:none;min-height:100vh;flex-direction:column;}

/* ── SIDEBAR ── */
.layout{display:flex;flex:1;}
.sidebar{
  width:240px;min-height:100vh;background:var(--sky-dark);
  display:flex;flex-direction:column;position:sticky;top:0;
  flex-shrink:0;
}
.sidebar-brand{
  padding:28px 24px 20px;border-bottom:1px solid rgba(255,255,255,.1);
}
.brand-emoji{font-size:28px;display:block;margin-bottom:4px;}
.brand-title{font-family:'Fredoka One',cursive;font-size:18px;color:var(--sun);}
.brand-sub{font-size:12px;color:rgba(255,255,255,.5);font-weight:600;margin-top:2px;}

.sidebar-nav{flex:1;padding:16px 12px;}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:11px 14px;border-radius:10px;
  font-size:14px;font-weight:700;color:rgba(255,255,255,.65);
  cursor:pointer;transition:all .18s;margin-bottom:4px;border:none;background:none;width:100%;text-align:left;
}
.nav-item:hover{background:rgba(255,255,255,.1);color:#fff;}
.nav-item.active{background:var(--sun);color:var(--sky-dark);}
.nav-icon{font-size:18px;width:24px;text-align:center;flex-shrink:0;}

.sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.1);}
.teacher-info{display:flex;align-items:center;gap:10px;}
.teacher-avatar{
  width:36px;height:36px;border-radius:50%;
  background:var(--sun);display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:14px;color:var(--sky-dark);flex-shrink:0;
}
.teacher-name{font-size:13px;font-weight:800;color:#fff;}
.teacher-role{font-size:11px;color:rgba(255,255,255,.5);}
.logout-btn{
  margin-top:12px;width:100%;background:rgba(255,255,255,.08);border:none;
  border-radius:8px;padding:9px;font-family:'Nunito',sans-serif;font-size:13px;
  font-weight:700;color:rgba(255,255,255,.6);cursor:pointer;transition:.18s;
}
.logout-btn:hover{background:rgba(255,255,255,.16);color:#fff;}

/* ── TOPBAR ── */
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{
  background:#fff;border-bottom:1px solid var(--border);
  padding:16px 28px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;
}
.topbar-title{font-family:'Fredoka One',cursive;font-size:22px;color:var(--sky-dark);}
.topbar-right{display:flex;align-items:center;gap:12px;}
.refresh-btn{
  background:var(--sky-light);border:none;border-radius:8px;padding:8px 16px;
  font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--sky-dark);
  cursor:pointer;display:flex;align-items:center;gap:6px;transition:.15s;
}
.refresh-btn:hover{background:var(--sky);color:#fff;}
.last-updated{font-size:12px;color:var(--muted);font-weight:600;}

/* ── CONTENT ── */
.content{flex:1;padding:28px;overflow-y:auto;}
.page{display:none;}
.page.active{display:block;}

/* ── STAT CARDS ── */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:28px;}
.stat-card{
  background:#fff;border-radius:var(--radius);padding:22px 20px;
  box-shadow:0 1px 4px rgba(0,0,0,.06);border:1px solid var(--border);
  position:relative;overflow:hidden;
}
.stat-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:4px;
}
.stat-card.blue::before{background:linear-gradient(90deg,var(--sky),#90d4e8);}
.stat-card.sun::before{background:linear-gradient(90deg,var(--sun),var(--sun-dark));}
.stat-card.green::before{background:linear-gradient(90deg,var(--green),#1B4332);}
.stat-card.purple::before{background:linear-gradient(90deg,var(--purple),#a78bfa);}
.stat-card.red::before{background:linear-gradient(90deg,var(--red),#ef9a9a);}
.stat-icon{font-size:28px;margin-bottom:10px;display:block;}
.stat-num{font-family:'Fredoka One',cursive;font-size:38px;color:var(--sky-dark);line-height:1;}
.stat-label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:4px;}
.stat-delta{font-size:12px;font-weight:700;margin-top:6px;display:flex;align-items:center;gap:4px;}
.delta-up{color:var(--green-dark);}
.delta-warn{color:var(--amber);}

/* ── SECTION HEADS ── */
.section-head{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;
}
.section-title{font-family:'Fredoka One',cursive;font-size:20px;color:var(--sky-dark);}
.section-sub{font-size:13px;color:var(--muted);margin-top:2px;}
.pill-tag{
  background:var(--sky-light);color:var(--sky-dark);
  border-radius:50px;padding:4px 12px;font-size:12px;font-weight:700;
}

/* ── CARDS ── */
.card{
  background:#fff;border-radius:var(--radius);padding:24px;
  box-shadow:0 1px 4px rgba(0,0,0,.06);border:1px solid var(--border);
  margin-bottom:20px;
}
.card-title{font-family:'Fredoka One',cursive;font-size:17px;color:var(--sky-dark);margin-bottom:16px;}

/* ── STUDENT TABLE ── */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:14px;}
thead tr{background:var(--sky-dark);}
thead th{
  color:#fff;padding:12px 16px;text-align:left;font-size:12px;
  font-weight:700;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;
}
thead th:first-child{border-radius:10px 0 0 10px;}
thead th:last-child{border-radius:0 10px 10px 0;}
tbody tr{border-bottom:1px solid var(--border);transition:background .15s;cursor:pointer;}
tbody tr:hover{background:var(--sky-light);}
tbody tr:last-child{border-bottom:none;}
tbody td{padding:13px 16px;vertical-align:middle;}
.student-name-cell{display:flex;align-items:center;gap:10px;}
.avatar-sm{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:13px;color:#fff;flex-shrink:0;
}
.student-name-text{font-weight:800;font-size:14px;color:var(--sky-dark);}
.student-joined{font-size:11px;color:var(--muted);}

/* activity checkpoint pills */
.cp-row{display:flex;gap:4px;flex-wrap:wrap;}
.cp-pill{
  font-size:10px;font-weight:700;padding:3px 8px;border-radius:50px;white-space:nowrap;
}
.cp-done{background:var(--green-light);color:var(--green-dark);}
.cp-todo{background:var(--border);color:var(--muted);}

/* points badge */
.pts-badge{
  font-family:'Fredoka One',cursive;font-size:18px;
  color:var(--sun-dark);display:flex;align-items:center;gap:4px;
}

/* progress mini-bar */
.mini-bar-wrap{width:100px;background:#e2e8f0;border-radius:50px;height:8px;overflow:hidden;}
.mini-bar-fill{height:100%;border-radius:50px;transition:width .4s;}

/* status badge */
.status-badge{
  display:inline-flex;align-items:center;gap:5px;
  border-radius:50px;padding:4px 12px;font-size:12px;font-weight:700;white-space:nowrap;
}
.s-complete{background:var(--green-light);color:var(--green-dark);}
.s-progress{background:var(--sun-light);color:var(--sun-dark);}
.s-started{background:var(--sky-light);color:var(--sky-dark);}
.s-notstarted{background:var(--border);color:var(--muted);}

/* ── ACTIVITY BARS ── */
.act-bar-row{margin-bottom:16px;}
.act-bar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.act-bar-name{font-size:14px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px;}
.act-bar-count{font-size:13px;font-weight:700;color:var(--muted);}
.act-bar-track{background:var(--border);border-radius:50px;height:14px;overflow:hidden;}
.act-bar-fill{height:100%;border-radius:50px;transition:width .6s ease;}

/* ── SPOTLIGHT (student detail) ── */
.spotlight-overlay{
  position:fixed;inset:0;background:rgba(2,48,71,.5);z-index:200;
  display:none;align-items:flex-end;justify-content:flex-end;
}
.spotlight-overlay.open{display:flex;}
.spotlight-panel{
  background:#fff;width:380px;max-width:100%;height:100vh;overflow-y:auto;
  padding:28px;box-shadow:-8px 0 32px rgba(0,0,0,.15);animation:slideIn .25s ease;
}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.sp-close{
  background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);
  float:right;margin-bottom:16px;
}
.sp-avatar{
  width:64px;height:64px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Fredoka One',cursive;font-size:26px;color:#fff;margin:0 auto 12px;
}
.sp-name{font-family:'Fredoka One',cursive;font-size:24px;color:var(--sky-dark);text-align:center;}
.sp-pts{font-size:16px;font-weight:800;color:var(--sun-dark);text-align:center;margin-bottom:20px;}
.sp-section{font-size:12px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:20px 0 10px;}
.sp-act-item{
  display:flex;align-items:center;gap:12px;padding:10px 0;
  border-bottom:1px solid var(--border);
}
.sp-act-item:last-child{border-bottom:none;}
.sp-act-icon{font-size:24px;flex-shrink:0;}
.sp-act-name{font-size:14px;font-weight:700;color:var(--text);}
.sp-act-status{margin-left:auto;}

/* ── NOTES ── */
.note-row{
  background:var(--bg);border-radius:var(--radius-sm);padding:14px 16px;
  margin-bottom:10px;display:flex;align-items:flex-start;gap:12px;
}
.note-icon{font-size:20px;flex-shrink:0;margin-top:2px;}
.note-text{font-size:14px;font-weight:600;color:var(--text);line-height:1.5;}
.note-student{font-size:12px;font-weight:700;color:var(--muted);margin-top:2px;}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:60px 24px;}
.empty-emoji{font-size:64px;display:block;margin-bottom:16px;}
.empty-title{font-family:'Fredoka One',cursive;font-size:24px;color:var(--sky-dark);margin-bottom:8px;}
.empty-sub{font-size:15px;color:var(--muted);line-height:1.6;max-width:320px;margin:0 auto 24px;}
.demo-btn{
  background:var(--sun);border:none;border-radius:50px;padding:14px 32px;
  font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;color:var(--sky-dark);
  cursor:pointer;transition:.15s;box-shadow:0 3px 0 var(--sun-dark);
}
.demo-btn:hover{transform:translateY(-2px);}

/* ── FILTER BAR ── */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;}
.filter-chip{
  background:#fff;border:2px solid var(--border);border-radius:50px;
  padding:7px 16px;font-size:13px;font-weight:700;color:var(--muted);
  cursor:pointer;transition:.15s;font-family:'Nunito',sans-serif;
}
.filter-chip:hover{border-color:var(--sky);color:var(--sky-dark);}
.filter-chip.active{background:var(--sky-dark);border-color:var(--sky-dark);color:#fff;}

/* ── WEEK TABS ── */
.week-tabs{display:flex;gap:4px;background:var(--bg);border-radius:50px;padding:4px;margin-bottom:20px;width:fit-content;}
.week-tab{
  background:none;border:none;border-radius:50px;padding:8px 20px;
  font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--muted);
  cursor:pointer;transition:.15s;
}
.week-tab.active{background:#fff;color:var(--sky-dark);box-shadow:0 1px 4px rgba(0,0,0,.1);}

/* ── CHECKPOINT TIMELINE ── */
.checkpoint-timeline{display:flex;gap:0;align-items:center;}
.cp-step{display:flex;align-items:center;}
.cp-circle{
  width:36px;height:36px;border-radius:50%;border:3px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:14px;
  background:#fff;font-weight:800;color:var(--muted);flex-shrink:0;transition:.2s;
}
.cp-circle.done{background:var(--green);border-color:var(--green-dark);color:#fff;}
.cp-circle.current{background:var(--sun);border-color:var(--sun-dark);color:var(--sky-dark);}
.cp-line{flex:1;height:3px;background:var(--border);min-width:20px;}
.cp-line.done{background:var(--green);}

/* ── ALERTS ── */
.alert-row{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border-radius:var(--radius-sm);margin-bottom:10px;}
.alert-warn{background:var(--amber-light);border-left:4px solid var(--amber);}
.alert-info{background:var(--sky-light);border-left:4px solid var(--sky);}
.alert-success{background:var(--green-light);border-left:4px solid var(--green);}
.alert-icon{font-size:18px;flex-shrink:0;margin-top:1px;}
.alert-body{flex:1;}
.alert-title{font-size:14px;font-weight:800;color:var(--text);}
.alert-desc{font-size:13px;color:var(--muted);margin-top:2px;}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .sidebar{display:none;}
  .content{padding:16px;}
  .stats-row{grid-template-columns:repeat(2,1fr);}
  .spotlight-panel{width:100%;}
}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--sky-dark);color:#fff;border-radius:50px;padding:13px 24px;
  font-size:14px;font-weight:700;z-index:999;transition:transform .3s;white-space:nowrap;
  box-shadow:0 6px 20px rgba(0,0,0,.2);
}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- ══════════════ LOGIN ══════════════ -->
<div id="login-screen">
  <div class="login-card">
    <span class="login-logo">👩‍🏫</span>
    <div class="login-title">Teacher Dashboard</div>
    <div class="login-sub">Solar Park Explorer · Grade 6 PBL</div>
    <div class="pin-dots">
      <div class="pin-dot" id="dot-0"></div>
      <div class="pin-dot" id="dot-1"></div>
      <div class="pin-dot" id="dot-2"></div>
      <div class="pin-dot" id="dot-3"></div>
    </div>
    <div class="numpad">
      <button class="num-btn" onclick="pinPress('1')">1</button>
      <button class="num-btn" onclick="pinPress('2')">2</button>
      <button class="num-btn" onclick="pinPress('3')">3</button>
      <button class="num-btn" onclick="pinPress('4')">4</button>
      <button class="num-btn" onclick="pinPress('5')">5</button>
      <button class="num-btn" onclick="pinPress('6')">6</button>
      <button class="num-btn" onclick="pinPress('7')">7</button>
      <button class="num-btn" onclick="pinPress('8')">8</button>
      <button class="num-btn" onclick="pinPress('9')">9</button>
      <button class="num-btn del" onclick="pinDel()">⌫</button>
      <button class="num-btn" onclick="pinPress('0')">0</button>
      <button class="num-btn go" onclick="pinSubmit()">✓</button>
    </div>
    <div class="login-hint">Demo PIN: 1234</div>
  </div>
</div>

<!-- ══════════════ MAIN APP ══════════════ -->
<div id="app">
  <div class="layout">

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-brand">
        <span class="brand-emoji">☀️</span>
        <div class="brand-title">Solar Park</div>
        <div class="brand-sub">Teacher Portal</div>
      </div>
      <div class="sidebar-nav">
        <button class="nav-item active" onclick="goPage('overview')" id="nav-overview">
          <span class="nav-icon">📊</span> Overview
        </button>
        <button class="nav-item" onclick="goPage('students')" id="nav-students">
          <span class="nav-icon">👨‍🎓</span> Students
        </button>
        <button class="nav-item" onclick="goPage('activities')" id="nav-activities">
          <span class="nav-icon">🎯</span> Activities
        </button>
        <button class="nav-item" onclick="goPage('checkpoints')" id="nav-checkpoints">
          <span class="nav-icon">✅</span> Checkpoints
        </button>
        <button class="nav-item" onclick="goPage('alerts')" id="nav-alerts">
          <span class="nav-icon">🔔</span> Alerts
        </button>
      </div>
      <div class="sidebar-footer">
        <div class="teacher-info">
          <div class="teacher-avatar">T</div>
          <div>
            <div class="teacher-name">Ms. Teacher</div>
            <div class="teacher-role">Grade 6 · Science</div>
          </div>
        </div>
        <button class="logout-btn" onclick="logout()">🚪 Sign out</button>
      </div>
    </div>

    <!-- Main -->
    <div class="main-area">
      <div class="topbar">
        <div class="topbar-title" id="page-title">Class Overview</div>
        <div class="topbar-right">
          <div class="last-updated" id="last-updated-text">Updated just now</div>
          <button class="refresh-btn" onclick="refreshAll()">↻ Refresh</button>
        </div>
      </div>

      <div class="content">

        <!-- ── PAGE: OVERVIEW ── -->
        <div class="page active" id="page-overview">
          <div class="stats-row" id="stats-row"></div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;" id="overview-grid">

            <div class="card">
              <div class="card-title">🏆 Top Scorers</div>
              <div id="top-scorers"></div>
            </div>

            <div class="card">
              <div class="card-title">📈 Activity Completion</div>
              <div id="act-completion-bars"></div>
            </div>

          </div>

          <div class="card">
            <div class="card-title">🔄 Recent Activity</div>
            <div id="recent-activity"></div>
          </div>
        </div>

        <!-- ── PAGE: STUDENTS ── -->
        <div class="page" id="page-students">
          <div class="filter-bar" id="filter-bar">
            <button class="filter-chip active" onclick="filterStudents('all',this)">All Students</button>
            <button class="filter-chip" onclick="filterStudents('complete',this)">✅ Completed</button>
            <button class="filter-chip" onclick="filterStudents('inprogress',this)">🔄 In Progress</button>
            <button class="filter-chip" onclick="filterStudents('notstarted',this)">⏳ Not Started</button>
          </div>
          <div class="card" style="padding:0;overflow:hidden;">
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Student</th>
                    <th>Points</th>
                    <th>Progress</th>
                    <th>Activities</th>
                    <th>Status</th>
                    <th>Last Seen</th>
                  </tr>
                </thead>
                <tbody id="students-tbody"></tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- ── PAGE: ACTIVITIES ── -->
        <div class="page" id="page-activities">
          <div id="activities-detail"></div>
        </div>

        <!-- ── PAGE: CHECKPOINTS ── -->
        <div class="page" id="page-checkpoints">
          <div class="week-tabs">
            <button class="week-tab active" onclick="weekTab('week1',this)">Week 1</button>
            <button class="week-tab" onclick="weekTab('week2',this)">Week 2</button>
          </div>
          <div id="checkpoints-content"></div>
        </div>

        <!-- ── PAGE: ALERTS ── -->
        <div class="page" id="page-alerts">
          <div id="alerts-content"></div>
        </div>

      </div><!-- /content -->
    </div><!-- /main-area -->
  </div><!-- /layout -->
</div><!-- /app -->

<!-- Student Spotlight Panel -->
<div class="spotlight-overlay" id="spotlight" onclick="closeSpotlight(event)">
  <div class="spotlight-panel" id="spotlight-panel">
    <button class="sp-close" onclick="closeSpotlightBtn()">✕</button>
    <div id="spotlight-inner"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════
//  CONSTANTS
// ══════════════════════════════════════════
const PIN = '1234';
const STORAGE_KEY = 'solarParkStudents';
const ACT_META = [
  { key:'activity1', name:'Solar Quiz',    icon:'☀️', pts:20 },
  { key:'activity2', name:'Match It',      icon:'🔗', pts:15 },
  { key:'activity3', name:'Fill Blanks',   icon:'📝', pts:15 },
  { key:'activity4', name:'Sort It',       icon:'🧩', pts:15 },
  { key:'activity5', name:'Build My Park', icon:'🏗️', pts:10 },
];
const AVATAR_COLORS = ['#219EBC','#52B788','#FFB703','#7C3AED','#EF5350','#FB8500','#0e9f6e','#d61f69'];
const MAX_PTS = 75;
const MAX_ACTS = 5;

// ══════════════════════════════════════════
//  PIN LOGIC
// ══════════════════════════════════════════
let pinVal = '';
function pinPress(d){
  if(pinVal.length>=4)return;
  pinVal+=d;
  renderDots();
  if(pinVal.length===4) setTimeout(pinSubmit,200);
}
function pinDel(){ pinVal=pinVal.slice(0,-1); renderDots(); }
function renderDots(){
  for(let i=0;i<4;i++){
    const el=document.getElementById('dot-'+i);
    el.classList.toggle('filled',i<pinVal.length);
    el.textContent=i<pinVal.length?'●':'';
  }
}
function pinSubmit(){
  if(pinVal===PIN){ enterApp(); }
  else {
    for(let i=0;i<4;i++) document.getElementById('dot-'+i).classList.add('error');
    setTimeout(()=>{for(let i=0;i<4;i++) document.getElementById('dot-'+i).classList.remove('error');pinVal='';renderDots();},600);
  }
}
function enterApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  refreshAll();
}
function logout(){
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  pinVal=''; renderDots();
}

// ══════════════════════════════════════════
//  DATA
// ══════════════════════════════════════════
function getStudents(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'); }
  catch(e){ return []; }
}

function seedDemo(){
  const names=['Fatima Al Zaabi','Mohammed Hassan','Aisha Rahman','Omar Al Mansoori',
                'Layla Khalid','Yousef Ibrahim','Mariam Al Hamdan','Saeed Al Nuaimi',
                'Nora Ahmed','Hamdan Al Maktoum'];
  const seeds=names.map((name,i)=>{
    const actCount=Math.floor(Math.random()*6);
    const doneActs=ACT_META.slice(0,actCount).map(a=>a.key);
    const pts=doneActs.reduce((s,k)=>s+(ACT_META.find(a=>a.key===k)?.pts||0),0);
    return{
      name, points:pts,
      activities:actCount,
      done:doneActs,
      timestamp: Date.now() - Math.floor(Math.random()*86400000*3)
    };
  });
  localStorage.setItem(STORAGE_KEY,JSON.stringify(seeds));
  showToast('Demo data loaded! 🎉');
  refreshAll();
}

function avatarColor(name){
  let h=0; for(const c of name) h=(h*31+c.charCodeAt(0))%AVATAR_COLORS.length;
  return AVATAR_COLORS[h];
}
function initials(name){ return name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase(); }
function formatTime(ts){
  if(!ts)return'—';
  const diff=Date.now()-ts;
  if(diff<60000)return'Just now';
  if(diff<3600000)return Math.round(diff/60000)+'m ago';
  if(diff<86400000)return Math.round(diff/3600000)+'h ago';
  return Math.round(diff/86400000)+'d ago';
}
function studentStatus(s){
  if(s.activities===MAX_ACTS)return{cls:'s-complete',label:'✅ Complete'};
  if(s.activities>=3)return{cls:'s-progress',label:'🔄 In Progress'};
  if(s.activities>0)return{cls:'s-started',label:'🌱 Started'};
  return{cls:'s-notstarted',label:'⏳ Not Started'};
}
function barColor(pct){ if(pct>=80)return'#52B788'; if(pct>=50)return'#FFB703'; return'#EF5350'; }

// ══════════════════════════════════════════
//  PAGE NAVIGATION
// ══════════════════════════════════════════
const PAGE_TITLES={overview:'Class Overview',students:'All Students',activities:'Activity Analysis',checkpoints:'PBL Checkpoints',alerts:'Attention Needed'};
let curPage='overview';

function goPage(p){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.getElementById('nav-'+p).classList.add('active');
  document.getElementById('page-title').textContent=PAGE_TITLES[p];
  curPage=p;
  renderPage(p);
}

function renderPage(p){
  const students=getStudents();
  if(p==='overview')renderOverview(students);
  else if(p==='students')renderStudents(students,'all');
  else if(p==='activities')renderActivities(students);
  else if(p==='checkpoints')renderCheckpoints(students,'week1');
  else if(p==='alerts')renderAlerts(students);
}

// ══════════════════════════════════════════
//  OVERVIEW
// ══════════════════════════════════════════
function renderOverview(students){
  const total=students.length;
  const totalPts=students.reduce((a,s)=>a+s.points,0);
  const avgPts=total?Math.round(totalPts/total):0;
  const completed=students.filter(s=>s.activities===MAX_ACTS).length;
  const totalActs=students.reduce((a,s)=>a+s.activities,0);
  const classComp=total?Math.round((totalActs/(total*MAX_ACTS))*100):0;
  const struggling=students.filter(s=>s.activities===0).length;

  document.getElementById('stats-row').innerHTML=`
    <div class="stat-card blue">
      <span class="stat-icon">👨‍🎓</span>
      <div class="stat-num">${total}</div>
      <div class="stat-label">Total Students</div>
    </div>
    <div class="stat-card sun">
      <span class="stat-icon">⭐</span>
      <div class="stat-num">${avgPts}</div>
      <div class="stat-label">Avg Points</div>
      <div class="stat-delta delta-up">Max ${MAX_PTS} pts</div>
    </div>
    <div class="stat-card green">
      <span class="stat-icon">✅</span>
      <div class="stat-num">${completed}</div>
      <div class="stat-label">Fully Complete</div>
      <div class="stat-delta ${completed>0?'delta-up':'delta-warn'}">${total?Math.round(completed/total*100):0}% of class</div>
    </div>
    <div class="stat-card purple">
      <span class="stat-icon">📈</span>
      <div class="stat-num">${classComp}%</div>
      <div class="stat-label">Class Completion</div>
    </div>
    <div class="stat-card red">
      <span class="stat-icon">⚠️</span>
      <div class="stat-num">${struggling}</div>
      <div class="stat-label">Need Attention</div>
      <div class="stat-delta delta-warn">${struggling>0?'No activities yet':''}</div>
    </div>
  `;

  // Top scorers
  const top=[...students].sort((a,b)=>b.points-a.points).slice(0,5);
  const scorersEl=document.getElementById('top-scorers');
  if(!top.length){ scorersEl.innerHTML=emptyMini(); return; }
  scorersEl.innerHTML=top.map((s,i)=>`
    <div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;" onclick="openSpotlight('${s.name}')">
      <div style="font-family:'Fredoka One',cursive;font-size:18px;color:var(--muted);width:20px;text-align:center;">${i+1}</div>
      <div class="avatar-sm" style="background:${avatarColor(s.name)}">${initials(s.name)}</div>
      <div style="flex:1;">
        <div style="font-size:14px;font-weight:800;color:var(--sky-dark);">${s.name}</div>
        <div style="font-size:12px;color:var(--muted);">${s.activities}/${MAX_ACTS} activities</div>
      </div>
      <div class="pts-badge">⭐${s.points}</div>
    </div>
  `).join('');

  // Activity bars
  const barsEl=document.getElementById('act-completion-bars');
  barsEl.innerHTML=ACT_META.map(a=>{
    const count=students.filter(s=>s.done&&s.done.includes(a.key)).length;
    const pct=total?Math.round(count/total*100):0;
    return`<div class="act-bar-row">
      <div class="act-bar-header">
        <span class="act-bar-name">${a.icon} ${a.name}</span>
        <span class="act-bar-count">${count}/${total}</span>
      </div>
      <div class="act-bar-track"><div class="act-bar-fill" style="width:${pct}%;background:${barColor(pct)};"></div></div>
    </div>`;
  }).join('');

  // Recent activity
  const recent=[...students].sort((a,b)=>(b.timestamp||0)-(a.timestamp||0)).slice(0,6);
  const recentEl=document.getElementById('recent-activity');
  if(!recent.length){ recentEl.innerHTML=emptyMini(); return; }
  recentEl.innerHTML=recent.map(s=>`
    <div style="display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);cursor:pointer;" onclick="openSpotlight('${s.name}')">
      <div class="avatar-sm" style="background:${avatarColor(s.name)}">${initials(s.name)}</div>
      <div style="flex:1;">
        <div style="font-size:14px;font-weight:800;color:var(--text);">${s.name}</div>
        <div style="font-size:12px;color:var(--muted);">${s.activities} activities · ${s.points} pts</div>
      </div>
      <div style="font-size:12px;font-weight:700;color:var(--muted);">${formatTime(s.timestamp)}</div>
    </div>
  `).join('');
}

function emptyMini(){ return`<div style="text-align:center;padding:24px;color:var(--muted);font-size:13px;font-weight:700;">No student data yet</div>`; }

// ══════════════════════════════════════════
//  STUDENTS TABLE
// ══════════════════════════════════════════
let currentFilter='all';
function filterStudents(f,btn){
  currentFilter=f;
  document.querySelectorAll('.filter-chip').forEach(el=>el.classList.remove('active'));
  btn.classList.add('active');
  renderStudents(getStudents(),f);
}

function renderStudents(students,filter){
  let list=students;
  if(filter==='complete') list=students.filter(s=>s.activities===MAX_ACTS);
  else if(filter==='inprogress') list=students.filter(s=>s.activities>0&&s.activities<MAX_ACTS);
  else if(filter==='notstarted') list=students.filter(s=>s.activities===0);

  const tbody=document.getElementById('students-tbody');
  if(!list.length){
    tbody.innerHTML=`<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--muted);font-weight:700;">No students found</td></tr>`;
    return;
  }
  tbody.innerHTML=list.map(s=>{
    const status=studentStatus(s);
    const pct=Math.round((s.activities/MAX_ACTS)*100);
    const cps=ACT_META.map(a=>`<span class="cp-pill ${s.done&&s.done.includes(a.key)?'cp-done':'cp-todo'}">${a.icon}</span>`).join('');
    return`<tr onclick="openSpotlight('${s.name}')">
      <td><div class="student-name-cell">
        <div class="avatar-sm" style="background:${avatarColor(s.name)}">${initials(s.name)}</div>
        <div><div class="student-name-text">${s.name}</div></div>
      </div></td>
      <td><div class="pts-badge">⭐ ${s.points}</div></td>
      <td>
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="mini-bar-wrap"><div class="mini-bar-fill" style="width:${pct}%;background:${barColor(pct)};"></div></div>
          <span style="font-size:12px;font-weight:700;color:var(--muted);">${pct}%</span>
        </div>
      </td>
      <td><div class="cp-row">${cps}</div></td>
      <td><span class="status-badge ${status.cls}">${status.label}</span></td>
      <td style="color:var(--muted);font-size:13px;font-weight:600;">${formatTime(s.timestamp)}</td>
    </tr>`;
  }).join('');
}

// ══════════════════════════════════════════
//  ACTIVITIES PAGE
// ══════════════════════════════════════════
function renderActivities(students){
  const total=students.length;
  const el=document.getElementById('activities-detail');
  el.innerHTML='';

  if(!total){
    el.innerHTML=emptyState();
    return;
  }

  ACT_META.forEach(a=>{
    const done=students.filter(s=>s.done&&s.done.includes(a.key));
    const pct=total?Math.round(done.length/total*100):0;
    const notDone=students.filter(s=>!s.done||!s.done.includes(a.key));
    const div=document.createElement('div');
    div.className='card';
    div.innerHTML=`
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
        <div style="font-size:36px;">${a.icon}</div>
        <div style="flex:1;">
          <div style="font-family:'Fredoka One',cursive;font-size:18px;color:var(--sky-dark);">${a.name}</div>
          <div style="font-size:13px;color:var(--muted);">${a.pts} points · ${done.length} of ${total} students completed</div>
        </div>
        <div style="font-family:'Fredoka One',cursive;font-size:28px;color:${barColor(pct)};">${pct}%</div>
      </div>
      <div class="act-bar-track" style="margin-bottom:16px;height:16px;">
        <div class="act-bar-fill" style="width:${pct}%;background:${barColor(pct)};"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div>
          <div style="font-size:12px;font-weight:800;color:var(--green-dark);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">✅ Completed (${done.length})</div>
          ${done.length?done.map(s=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;cursor:pointer;" onclick="openSpotlight('${s.name}')">
            <div class="avatar-sm" style="background:${avatarColor(s.name)};width:24px;height:24px;font-size:10px;">${initials(s.name)}</div>
            <span style="font-size:13px;font-weight:700;">${s.name}</span>
            <span style="margin-left:auto;font-size:12px;font-weight:700;color:var(--green-dark);">⭐${a.pts}</span>
          </div>`).join(''):`<div style="font-size:13px;color:var(--muted);">None yet</div>`}
        </div>
        <div>
          <div style="font-size:12px;font-weight:800;color:var(--red);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">⏳ Still to complete (${notDone.length})</div>
          ${notDone.length?notDone.map(s=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;cursor:pointer;" onclick="openSpotlight('${s.name}')">
            <div class="avatar-sm" style="background:${avatarColor(s.name)};width:24px;height:24px;font-size:10px;">${initials(s.name)}</div>
            <span style="font-size:13px;font-weight:700;color:var(--muted);">${s.name}</span>
          </div>`).join(''):`<div style="font-size:13px;color:var(--green-dark);font-weight:700;">All done! 🎉</div>`}
        </div>
      </div>
    `;
    el.appendChild(div);
  });
}

// ══════════════════════════════════════════
//  CHECKPOINTS PAGE
// ══════════════════════════════════════════
const WEEK_DATA = {
  week1:{
    label:'Week 1 — Learn + Apply + Draft',
    checkpoints:[
      { num:1, label:'Research & Understanding', acts:['activity1'], lesson:'Lesson 2', desc:'Students explain what solar energy is' },
      { num:2, label:'Design Plan (Draft)', acts:['activity3','activity4'], lesson:'Lesson 4', desc:'Students draft a solar park design' },
    ]
  },
  week2:{
    label:'Week 2 — Improve + Final + Reflect',
    checkpoints:[
      { num:3, label:'Revision', acts:['activity2'], lesson:'Lesson 6', desc:'Students improve and refine their park design' },
      { num:4, label:'Final Submission', acts:['activity5'], lesson:'Lesson 8', desc:'Students complete and present their park' },
      { num:5, label:'Reflection', acts:[], lesson:'Lesson 8', desc:'Students reflect on their learning journey' },
    ]
  }
};

let currentWeek='week1';
function weekTab(w,btn){
  currentWeek=w;
  document.querySelectorAll('.week-tab').forEach(el=>el.classList.remove('active'));
  btn.classList.add('active');
  renderCheckpoints(getStudents(),w);
}

function renderCheckpoints(students,week){
  const data=WEEK_DATA[week];
  const total=students.length;
  const el=document.getElementById('checkpoints-content');
  el.innerHTML='';

  // Timeline
  const allCPs=[...WEEK_DATA.week1.checkpoints,...WEEK_DATA.week2.checkpoints];
  const tlDiv=document.createElement('div');
  tlDiv.className='card';
  tlDiv.innerHTML=`<div class="card-title">📍 Project Timeline</div>
  <div class="checkpoint-timeline">
    ${allCPs.map((cp,i)=>{
      const isDone=cp.acts.every(a=>students.filter(s=>s.done&&s.done.includes(a)).length>0) && cp.acts.length>0;
      const isCurrent=!isDone&&(i===0||allCPs.slice(0,i).every(c=>c.acts.every(a=>students.filter(s=>s.done&&s.done.includes(a)).length>0)&&c.acts.length>0));
      return`
        ${i>0?`<div class="cp-line ${isDone?'done':''}"></div>`:''}
        <div class="cp-step" style="flex-direction:column;align-items:center;gap:4px;">
          <div class="cp-circle ${isDone?'done':isCurrent?'current':''}">${isDone?'✓':cp.num}</div>
          <div style="font-size:10px;font-weight:700;color:var(--muted);text-align:center;max-width:60px;line-height:1.3;">CP ${cp.num}</div>
        </div>`;
    }).join('')}
  </div>`;
  el.appendChild(tlDiv);

  data.checkpoints.forEach(cp=>{
    const eligibleStudents=students.filter(s=>
      cp.acts.length===0 || cp.acts.some(a=>s.done&&s.done.includes(a))
    );
    const cpPct=total?Math.round(eligibleStudents.length/total*100):0;
    const card=document.createElement('div');
    card.className='card';
    card.innerHTML=`
      <div style="display:flex;align-items:flex-start;gap:16px;margin-bottom:16px;">
        <div style="width:44px;height:44px;border-radius:50%;background:var(--sky-dark);display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:20px;color:var(--sun);flex-shrink:0;">${cp.num}</div>
        <div style="flex:1;">
          <div style="font-family:'Fredoka One',cursive;font-size:18px;color:var(--sky-dark);">${cp.label}</div>
          <div style="font-size:13px;color:var(--muted);margin-top:2px;">${cp.lesson} · ${cp.desc}</div>
        </div>
        <span class="status-badge ${cpPct>=80?'s-complete':cpPct>0?'s-progress':'s-notstarted'}">${cpPct}% reached</span>
      </div>
      <div class="act-bar-track" style="height:10px;margin-bottom:16px;">
        <div class="act-bar-fill" style="width:${cpPct}%;background:${barColor(cpPct)};"></div>
      </div>
      ${cp.acts.length?`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;">
        ${cp.acts.map(a=>{
          const meta=ACT_META.find(m=>m.key===a);
          const cnt=students.filter(s=>s.done&&s.done.includes(a)).length;
          return`<div style="background:var(--sky-light);border-radius:8px;padding:8px 14px;font-size:13px;font-weight:700;color:var(--sky-dark);">${meta.icon} ${meta.name}: <strong>${cnt}/${total}</strong></div>`;
        }).join('')}
      </div>`:'<div style="font-size:13px;color:var(--muted);margin-bottom:12px;">Reflection checkpoint — tracked by teacher</div>'}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div style="background:var(--green-light);border-radius:10px;padding:12px;">
          <div style="font-size:12px;font-weight:800;color:var(--green-dark);margin-bottom:6px;">✅ Reached (${eligibleStudents.length})</div>
          <div style="font-size:13px;color:var(--green-dark);font-weight:700;">${eligibleStudents.slice(0,4).map(s=>s.name).join(', ')}${eligibleStudents.length>4?` +${eligibleStudents.length-4} more`:''}</div>
        </div>
        <div style="background:var(--red-light);border-radius:10px;padding:12px;">
          <div style="font-size:12px;font-weight:800;color:var(--red);margin-bottom:6px;">⏳ Not yet (${total-eligibleStudents.length})</div>
          <div style="font-size:13px;color:var(--red);font-weight:700;">${students.filter(s=>!eligibleStudents.includes(s)).slice(0,4).map(s=>s.name).join(', ')||'None!'}</div>
        </div>
      </div>
    `;
    el.appendChild(card);
  });
}

// ══════════════════════════════════════════
//  ALERTS
// ══════════════════════════════════════════
function renderAlerts(students){
  const el=document.getElementById('alerts-content');
  el.innerHTML='';

  const notStarted=students.filter(s=>s.activities===0);
  const stuck=students.filter(s=>s.activities>0&&s.activities<2);
  const almostDone=students.filter(s=>s.activities===MAX_ACTS-1);
  const stars=students.filter(s=>s.points===MAX_PTS);

  if(!students.length){ el.innerHTML=emptyState(); return; }

  if(stars.length){
    const card=document.createElement('div');
    card.className='card';
    card.innerHTML=`<div class="card-title" style="color:var(--sun-dark);">🏆 Perfect Scores!</div>
    ${stars.map(s=>`<div class="alert-row alert-success">
      <div class="alert-icon">🌟</div>
      <div class="alert-body">
        <div class="alert-title">${s.name} — perfect score!</div>
        <div class="alert-desc">Completed all 5 activities and earned all ${MAX_PTS} points.</div>
      </div>
      <button style="background:none;border:2px solid var(--green);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;color:var(--green-dark);cursor:pointer;" onclick="openSpotlight('${s.name}')">View</button>
    </div>`).join('')}`;
    el.appendChild(card);
  }

  if(almostDone.length){
    const card=document.createElement('div');
    card.className='card';
    card.innerHTML=`<div class="card-title">🎯 Almost There!</div>
    ${almostDone.map(s=>`<div class="alert-row alert-info">
      <div class="alert-icon">💪</div>
      <div class="alert-body">
        <div class="alert-title">${s.name} — one activity left</div>
        <div class="alert-desc">Completed ${s.activities}/${MAX_ACTS} activities. Encourage them to finish!</div>
      </div>
      <button style="background:none;border:2px solid var(--sky);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;color:var(--sky-dark);cursor:pointer;" onclick="openSpotlight('${s.name}')">View</button>
    </div>`).join('')}`;
    el.appendChild(card);
  }

  if(stuck.length){
    const card=document.createElement('div');
    card.className='card';
    card.innerHTML=`<div class="card-title" style="color:var(--amber);">⚠️ May Need Support</div>
    ${stuck.map(s=>`<div class="alert-row alert-warn">
      <div class="alert-icon">🤔</div>
      <div class="alert-body">
        <div class="alert-title">${s.name} — low activity count</div>
        <div class="alert-desc">Only completed ${s.activities} activity. May need a check-in or extra scaffolding.</div>
      </div>
      <button style="background:none;border:2px solid var(--amber);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;color:var(--sun-dark);cursor:pointer;" onclick="openSpotlight('${s.name}')">View</button>
    </div>`).join('')}`;
    el.appendChild(card);
  }

  if(notStarted.length){
    const card=document.createElement('div');
    card.className='card';
    card.innerHTML=`<div class="card-title" style="color:var(--red);">🔴 Not Started Yet</div>
    ${notStarted.map(s=>`<div class="alert-row" style="background:#FFEBEE;border-left:4px solid var(--red);">
      <div class="alert-icon">⏳</div>
      <div class="alert-body">
        <div class="alert-title">${s.name}</div>
        <div class="alert-desc">No activities completed. Needs immediate teacher attention.</div>
      </div>
      <button style="background:none;border:2px solid var(--red);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;color:var(--red);cursor:pointer;" onclick="openSpotlight('${s.name}')">View</button>
    </div>`).join('')}`;
    el.appendChild(card);
  }

  if(!notStarted.length&&!stuck.length&&!almostDone.length&&!stars.length){
    el.innerHTML=`<div class="empty-state">
      <span class="empty-emoji">😊</span>
      <div class="empty-title">All looks good!</div>
      <div class="empty-sub">No alerts right now. Your class is progressing well!</div>
    </div>`;
  }
}

// ══════════════════════════════════════════
//  SPOTLIGHT (student detail panel)
// ══════════════════════════════════════════
function openSpotlight(name){
  const students=getStudents();
  const s=students.find(st=>st.name===name);
  if(!s)return;
  const inner=document.getElementById('spotlight-inner');
  const status=studentStatus(s);
  const pct=Math.round((s.activities/MAX_ACTS)*100);

  inner.innerHTML=`
    <div style="text-align:center;margin-bottom:24px;">
      <div class="sp-avatar" style="background:${avatarColor(s.name)}">${initials(s.name)}</div>
      <div class="sp-name">${s.name}</div>
      <div class="sp-pts">⭐ ${s.points} / ${MAX_PTS} points</div>
      <span class="status-badge ${status.cls}">${status.label}</span>
    </div>

    <div style="background:var(--bg);border-radius:10px;padding:16px;margin-bottom:20px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
        <span style="font-size:13px;font-weight:700;color:var(--muted);">Overall Progress</span>
        <span style="font-size:13px;font-weight:800;color:var(--sky-dark);">${pct}%</span>
      </div>
      <div class="act-bar-track"><div class="act-bar-fill" style="width:${pct}%;background:${barColor(pct)};"></div></div>
      <div style="font-size:12px;color:var(--muted);margin-top:6px;font-weight:600;">Last active: ${formatTime(s.timestamp)}</div>
    </div>

    <div class="sp-section">Activities</div>
    ${ACT_META.map(a=>{
      const done=s.done&&s.done.includes(a.key);
      return`<div class="sp-act-item">
        <div class="sp-act-icon">${a.icon}</div>
        <div class="sp-act-name">${a.name}</div>
        <div class="sp-act-status">
          ${done
            ?`<span class="status-badge s-complete">✅ Done · +${a.pts}pts</span>`
            :`<span class="status-badge s-notstarted">⏳ To do</span>`}
        </div>
      </div>`;
    }).join('')}

    <div class="sp-section">Checkpoints</div>
    ${[...WEEK_DATA.week1.checkpoints,...WEEK_DATA.week2.checkpoints].map(cp=>{
      const reached=cp.acts.length===0||cp.acts.some(a=>s.done&&s.done.includes(a));
      return`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);">
        <div style="width:28px;height:28px;border-radius:50%;background:${reached?'var(--green)':'var(--border)'};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:${reached?'#fff':'var(--muted)'};">${reached?'✓':cp.num}</div>
        <span style="font-size:13px;font-weight:700;color:${reached?'var(--text)':'var(--muted)'};">${cp.label}</span>
        <span style="margin-left:auto;font-size:11px;color:var(--muted);">${cp.lesson}</span>
      </div>`;
    }).join('')}
  `;

  document.getElementById('spotlight').classList.add('open');
}

function closeSpotlight(e){
  if(e.target===document.getElementById('spotlight')) closeSpotlightBtn();
}
function closeSpotlightBtn(){
  document.getElementById('spotlight').classList.remove('open');
}

// ══════════════════════════════════════════
//  EMPTY STATE
// ══════════════════════════════════════════
function emptyState(){
  return`<div class="empty-state">
    <span class="empty-emoji">🏫</span>
    <div class="empty-title">No students yet!</div>
    <div class="empty-sub">Students who complete activities on the Solar Park Explorer app will show up here automatically. Or load demo data to preview the dashboard.</div>
    <button class="demo-btn" onclick="seedDemo()">Load Demo Students 🎮</button>
  </div>`;
}

// ══════════════════════════════════════════
//  REFRESH
// ══════════════════════════════════════════
function refreshAll(){
  const students=getStudents();
  renderPage(curPage);
  document.getElementById('last-updated-text').textContent='Updated '+formatTime(Date.now()-100);

  if(!students.length && curPage==='overview'){
    document.getElementById('stats-row').innerHTML='';
    document.getElementById('top-scorers').innerHTML=emptyMini();
    document.getElementById('act-completion-bars').innerHTML=emptyMini();
    document.getElementById('recent-activity').innerHTML=emptyMini();
    // show empty state CTA in stats row
    document.getElementById('stats-row').innerHTML=`<div class="card" style="grid-column:1/-1;">${emptyState()}</div>`;
  }
}

// ══════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2600);
}

// ══════════════════════════════════════════
//  KEYBOARD PIN SUPPORT
// ══════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(document.getElementById('login-screen').style.display==='none') return;
  if(e.key>='0'&&e.key<='9') pinPress(e.key);
  else if(e.key==='Backspace') pinDel();
  else if(e.key==='Enter') pinSubmit();
});

// ══════════════════════════════════════════
//  RESPONSIVE — mobile nav via overlay
// ══════════════════════════════════════════
// Auto-refresh every 30s
setInterval(refreshAll, 30000);
</script>
</body>
</html>
